<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>ฐานข้อมูลใบเสร็จ — Big C Sainoi</title>
<style>
  :root{
    --green-deep:#0B5D3B;
    --green:#12804F;
    --green-soft:#E4F3EC;
    --red:#C8272A;
    --red-soft:#FBE7E7;
    --cream:#FAF8F4;
    --ink:#1B211D;
    --muted:#6B756E;
    --line-dot:#C9CFC9;
    --card:#FFFFFF;
    --amber:#B8790A;
    --amber-soft:#FBF0DB;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:"Tahoma","Noto Sans Thai","Segoe UI",system-ui,sans-serif;
    padding-bottom:40px;
    -webkit-font-smoothing:antialiased;
  }
  header{
    background:linear-gradient(135deg,var(--green-deep),var(--green));
    color:#fff;
    padding:22px 18px 26px;
  }
  header .eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    opacity:.85;
    margin:0 0 4px;
  }
  header h1{margin:0;font-size:22px;font-weight:700;}
  header .sub{margin:4px 0 0;font-size:13px;opacity:.9;}

  .wrap{max-width:520px;margin:0 auto;padding:16px;}

  .card{
    background:var(--card);
    border-radius:14px;
    padding:16px;
    margin-bottom:14px;
    box-shadow:0 1px 3px rgba(11,93,59,0.08);
    border:1px solid rgba(11,93,59,0.07);
  }

  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
  label{font-size:12px;color:var(--muted);font-weight:600;}
  input[type=text], input[type=number], input[type=password]{
    border:1px solid #DADFDA;
    border-radius:9px;
    padding:10px 11px;
    font-size:14.5px;
    font-family:inherit;
    background:#fff;
    color:var(--ink);
    width:100%;
  }
  input:focus{outline:2px solid var(--green);outline-offset:1px;}

  .search-row{display:flex;gap:8px;}
  .search-row input{flex:1;}

  .btn{
    padding:12px 16px;
    border-radius:11px;
    border:none;
    font-size:14.5px;
    font-weight:700;
    font-family:inherit;
    cursor:pointer;
  }
  .btn-green{background:var(--green);color:#fff;}
  .btn-green:active{background:var(--green-deep);}
  .btn-outline{background:#fff;border:1.5px solid var(--green);color:var(--green-deep);}

  .section-title{
    font-size:13px;
    font-weight:700;
    color:var(--green-deep);
    text-transform:uppercase;
    letter-spacing:.06em;
    margin:2px 0 10px;
  }

  .meta-row{display:flex;justify-content:space-between;font-size:13.5px;padding:5px 0;}
  .meta-row span:first-child{color:var(--muted);}

  .item-row{
    border-radius:12px;
    background:#FBFCFB;
    border:1px solid #E7EBE8;
    padding:12px;
    margin-bottom:10px;
  }
  .item-row.done{background:var(--green-soft);border-color:var(--green);}
  .item-row.pending{background:var(--amber-soft);border-color:var(--amber);}
  .item-name{font-weight:700;font-size:14.5px;margin-bottom:8px;}
  .item-stats{display:flex;gap:10px;font-size:12.5px;color:var(--muted);margin-bottom:8px;flex-wrap:wrap;}
  .item-stats b{color:var(--ink);}
  .pickup-input{display:flex;align-items:center;gap:8px;}
  .pickup-input input{width:90px;}
  .pickup-input span{font-size:13px;color:var(--muted);}

  .status-pill{
    display:inline-block;
    font-size:11.5px;
    font-weight:700;
    padding:3px 9px;
    border-radius:999px;
  }
  .status-pill.done{background:var(--green-soft);color:var(--green-deep);}
  .status-pill.pending{background:var(--amber-soft);color:var(--amber);}

  .empty-state{
    text-align:center;
    color:var(--muted);
    font-size:13.5px;
    padding:20px 10px;
  }

  .pending-card{
    padding:13px;
    border-radius:12px;
    background:#FBFCFB;
    border:1px solid #E7EBE8;
    margin-bottom:10px;
    cursor:pointer;
  }
  .pending-card:active{background:var(--green-soft);}
  .pending-card .top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .pending-card .receipt-no{font-weight:700;font-size:14.5px;}
  .pending-card .cust{font-size:12.5px;color:var(--muted);}

  .toast{
    position:fixed;
    bottom:24px;left:50%;
    transform:translateX(-50%) translateY(10px);
    background:var(--ink);
    color:#fff;
    padding:9px 16px;
    border-radius:20px;
    font-size:13px;
    opacity:0;
    transition:opacity .2s, transform .2s;
    pointer-events:none;
    white-space:nowrap;
    z-index:500;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .tabs{display:flex;gap:8px;margin-bottom:14px;}
  .tab-btn{
    flex:1;
    padding:11px 8px;
    border-radius:10px;
    border:1.5px solid #DADFDA;
    background:#fff;
    font-size:13.5px;
    font-weight:700;
    color:var(--muted);
    cursor:pointer;
    font-family:inherit;
  }
  .tab-btn.active{border-color:var(--green);background:var(--green-soft);color:var(--green-deep);}
</style>
</head>
<body>

<header>
  <p class="eyebrow">Loss Prevention · Big C Hyper Sainoi</p>
  <h1>ฐานข้อมูลใบเสร็จ</h1>
  <p class="sub">ค้นด้วยเลขที่ใบเสร็จ ดูยอดสั่ง/รับไปแล้ว/คงเหลือ</p>
</header>

<div class="wrap">

  <div class="tabs">
    <button class="tab-btn active" id="tabAllBtn" onclick="switchTab('all')">ทั้งหมด</button>
    <button class="tab-btn" id="tabSearchBtn" onclick="switchTab('search')">ค้นหา</button>
    <button class="tab-btn" id="tabPendingBtn" onclick="switchTab('pending')">ค้างส่ง</button>
    <button class="tab-btn" id="tabImportBtn" onclick="switchTab('import')">นำเข้าลูกค้า</button>
  </div>

  <div id="allTab">
    <div class="card">
      <button class="btn btn-outline" style="width:100%;" onclick="loadAllList()">รีเฟรชรายการ</button>
    </div>
    <div id="allList"></div>
  </div>

  <div id="searchTab" style="display:none;">
    <div class="card">
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="เลขที่ใบเสร็จ" inputmode="numeric">
        <button class="btn btn-green" onclick="searchReceipt()">ค้นหา</button>
      </div>
    </div>

    <div id="resultArea"></div>
  </div>

  <div id="pendingTab" style="display:none;">
    <div class="card">
      <button class="btn btn-outline" style="width:100%;" onclick="loadPendingList()">รีเฟรชรายการ</button>
    </div>
    <div id="pendingList"></div>
  </div>

  <div id="importTab" style="display:none;">
    <div class="card">
      <p class="section-title">นำเข้ารายชื่อลูกค้า</p>
      <p style="font-size:12.5px;color:var(--muted);margin:0 0 10px;">วางข้อความรูปแบบ "ชื่อลูกค้า: ..." กับ "เลขที่สมาชิก: ..." สลับกันได้หลายคน ระบบจะแยกให้เอง</p>
      <div class="field">
        <textarea id="importText" rows="10" style="border:1px solid #DADFDA;border-radius:9px;padding:10px 11px;font-size:14px;font-family:inherit;width:100%;" placeholder="ชื่อลูกค้า: คุณ อาทิตย์ ต่ายคำ
เลขที่สมาชิก: 11151900288841616

ชื่อลูกค้า: คุณ ธนวรรณ
เลขที่สมาชิก: 1111119200309328"></textarea>
      </div>
      <button class="btn btn-green" style="width:100%;" onclick="importCustomers()">นำเข้าข้อมูล</button>
      <p id="importStatus" style="font-size:12px;color:var(--muted);margin:8px 0 0;"></p>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- ── Login gate ── -->
<div id="loginOverlay" style="position:fixed;inset:0;background:var(--cream);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px;">
  <div style="width:100%;max-width:360px;background:#fff;border-radius:16px;padding:24px;box-shadow:0 4px 20px rgba(11,93,59,0.12);">
    <p style="font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 4px;">Loss Prevention · Big C Sainoi</p>
    <h2 style="margin:0 0 18px;font-size:19px;color:var(--green-deep);">เข้าสู่ระบบ</h2>
    <div class="field">
      <label>อีเมล</label>
      <input type="text" id="loginEmail" placeholder="อีเมล">
    </div>
    <div class="field">
      <label>รหัสผ่าน</label>
      <input type="password" id="loginPassword" placeholder="รหัสผ่าน">
    </div>
    <button class="btn btn-green" style="width:100%;" onclick="doLogin()">เข้าสู่ระบบ</button>
    <p id="loginError" style="font-size:12.5px;color:var(--red);margin:10px 0 0;"></p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, collection, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDL-wJBqUmLl5abLPX8hUIfsZkrMbPovRA",
  authDomain: "b2b-pjs.firebaseapp.com",
  projectId: "b2b-pjs",
  storageBucket: "b2b-pjs.firebasestorage.app",
  messagingSenderId: "997047179126",
  appId: "1:997047179126:web:f378ee051bd4f4c6b54c57"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

window.doLogin = function(){
  const email = document.getElementById("loginEmail").value.trim();
  const pass = document.getElementById("loginPassword").value;
  const errEl = document.getElementById("loginError");
  errEl.textContent = "";
  signInWithEmailAndPassword(auth, email, pass).catch(()=>{
    errEl.textContent = "เข้าสู่ระบบไม่สำเร็จ ตรวจสอบอีเมล/รหัสผ่านอีกครั้ง";
  });
};

onAuthStateChanged(auth, (user)=>{
  document.getElementById("loginOverlay").style.display = user ? "none" : "flex";
  if(user){
    const params = new URLSearchParams(window.location.search);
    const receiptParam = params.get("receipt");
    if(receiptParam){
      switchTab("search");
      document.getElementById("searchInput").value = receiptParam;
      searchReceipt();
    } else {
      loadAllList();
    }
  }
});

function sanitizeReceiptId(receiptNo){
  return String(receiptNo).trim().replace(/[\/\s]+/g, "_");
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 1800);
}

window.switchTab = function(tab){
  document.getElementById("tabAllBtn").classList.toggle("active", tab==="all");
  document.getElementById("tabSearchBtn").classList.toggle("active", tab==="search");
  document.getElementById("tabPendingBtn").classList.toggle("active", tab==="pending");
  document.getElementById("tabImportBtn").classList.toggle("active", tab==="import");
  document.getElementById("allTab").style.display = tab==="all" ? "" : "none";
  document.getElementById("searchTab").style.display = tab==="search" ? "" : "none";
  document.getElementById("pendingTab").style.display = tab==="pending" ? "" : "none";
  document.getElementById("importTab").style.display = tab==="import" ? "" : "none";
  if(tab === "pending") loadPendingList();
  if(tab === "all") loadAllList();
};

function sanitizeKey(v){
  return String(v).trim().replace(/[\/\s]+/g, "_");
}

window.importCustomers = async function(){
  const statusEl = document.getElementById("importStatus");
  const text = document.getElementById("importText").value;
  if(!text.trim()){
    statusEl.textContent = "วางข้อความรายชื่อลูกค้าก่อนครับ";
    statusEl.style.color = "var(--red)";
    return;
  }

  // ดึงคู่ "ชื่อลูกค้า: ..." กับ "เลขที่สมาชิก: ..." ออกมาทั้งหมด ไม่ว่าจะมีบรรทัดว่างคั่นแบบไหน
  const nameMatches = [...text.matchAll(/ชื่อลูกค้า\s*:\s*(.+)/g)].map(m=>m[1].trim());
  const memberMatches = [...text.matchAll(/เลขที่สมาชิก\s*:\s*(.+)/g)].map(m=>m[1].trim());

  if(nameMatches.length === 0){
    statusEl.textContent = "ไม่พบรูปแบบ 'ชื่อลูกค้า: ...' ในข้อความ ลองเช็คฟอร์แมตอีกครั้ง";
    statusEl.style.color = "var(--red)";
    return;
  }

  const pairs = nameMatches.map((name, i) => ({ name, memberNo: memberMatches[i] || "" }));

  statusEl.textContent = `กำลังนำเข้า ${pairs.length} รายการ...`;
  statusEl.style.color = "var(--muted)";

  let successCount = 0;
  try{
    for(const p of pairs){
      if(!p.name && !p.memberNo) continue;
      const key = (p.memberNo || p.name);
      await setDoc(doc(db, "customers", sanitizeKey(key)), {
        custName: p.name || null,
        memberNo: p.memberNo || null,
        updatedAt: serverTimestamp()
      }, { merge: true });
      successCount++;
    }
    statusEl.textContent = `นำเข้าสำเร็จ ${successCount} รายการ`;
    statusEl.style.color = "var(--green-deep)";
    document.getElementById("importText").value = "";
    showToast(`เพิ่มลูกค้า ${successCount} คนแล้ว`);
  } catch(err){
    statusEl.textContent = "นำเข้าไม่สำเร็จ: " + err.message;
    statusEl.style.color = "var(--red)";
  }
};

window.loadAllList = async function(){
  const listEl = document.getElementById("allList");
  listEl.innerHTML = `<div class="card"><p class="empty-state">กำลังโหลด...</p></div>`;
  try{
    const snap = await getDocs(collection(db, "receipts"));
    const all = [];
    snap.forEach(docSnap=>{
      all.push({ id: docSnap.id, ...docSnap.data() });
    });
    if(all.length === 0){
      listEl.innerHTML = `<div class="card"><p class="empty-state">ยังไม่มีข้อมูลในฐานข้อมูล</p></div>`;
      return;
    }
    all.sort((a,b)=>{
      const ta = a.updatedAt && a.updatedAt.toMillis ? a.updatedAt.toMillis() : 0;
      const tb = b.updatedAt && b.updatedAt.toMillis ? b.updatedAt.toMillis() : 0;
      return tb - ta;
    });
    listEl.innerHTML = all.map(d=>{
      const hasRemaining = (d.items||[]).some(it => (it.remainingQty||0) > 0);
      const summary = (d.items||[]).map(it=>`${it.name} ${it.deliveredQty}/${it.orderedQty} ${it.unit}`).join(" · ");
      return `<div class="pending-card" onclick="jumpToReceipt('${d.receiptNo}')">
        <div class="top-row">
          <span class="receipt-no">${d.receiptNo}</span>
          <span class="status-pill ${hasRemaining?'pending':'done'}">${hasRemaining?'ค้างส่ง':'ครบแล้ว'}</span>
        </div>
        <div class="cust">${d.custName || modeLabel(d.mode)}</div>
        <div class="cust" style="margin-top:4px;">${summary}</div>
      </div>`;
    }).join("");
  } catch(err){
    listEl.innerHTML = `<div class="card"><p class="empty-state" style="color:var(--red);">โหลดไม่สำเร็จ: ${err.message}</p></div>`;
  }
};

let currentDocId = null;
let currentData = null;

window.searchReceipt = async function(){
  const receiptNo = document.getElementById("searchInput").value.trim();
  const resultArea = document.getElementById("resultArea");
  if(!receiptNo){
    resultArea.innerHTML = `<div class="card"><p class="empty-state">กรอกเลขที่ใบเสร็จก่อนค้นหา</p></div>`;
    return;
  }
  resultArea.innerHTML = `<div class="card"><p class="empty-state">กำลังค้นหา...</p></div>`;

  const docId = sanitizeReceiptId(receiptNo);
  try{
    const snap = await getDoc(doc(db, "receipts", docId));
    if(!snap.exists()){
      resultArea.innerHTML = `<div class="card"><p class="empty-state">ไม่พบเลขที่ใบเสร็จนี้ในฐานข้อมูล<br>(อาจยังไม่เคยบันทึกจากฟอร์มรายงาน)</p></div>`;
      currentDocId = null;
      currentData = null;
      return;
    }
    currentDocId = docId;
    currentData = snap.data();
    renderResult();
  } catch(err){
    resultArea.innerHTML = `<div class="card"><p class="empty-state" style="color:var(--red);">ค้นหาไม่สำเร็จ: ${err.message}</p></div>`;
  }
};

function modeLabel(m){
  return {
    b2b_pickup: "B2B · ลูกค้ามารับสินค้า",
    b2b_sale: "B2B · ขายสินค้า",
    pjs_sale: "PJS · ขายสินค้า",
    pjs_release: "PJS · ปล่อยสินค้า"
  }[m] || m;
}

function fmtMoney(n){
  const num = Number(n) || 0;
  return num.toLocaleString("en-US") + " บาท";
}

function renderResult(){
  const resultArea = document.getElementById("resultArea");
  const d = currentData;
  const allDone = d.items.every(it => (it.remainingQty||0) <= 0);

  let html = `<div class="card">
    <p class="section-title">ข้อมูลใบเสร็จ</p>
    <div class="meta-row"><span>เลขที่ใบเสร็จ</span><span>${d.receiptNo}</span></div>
    <div class="meta-row"><span>ประเภท</span><span>${modeLabel(d.mode)}</span></div>
    ${d.custName ? `<div class="meta-row"><span>ชื่อลูกค้า</span><span>${d.custName}</span></div>` : ``}
    ${d.memberNo ? `<div class="meta-row"><span>เลขที่สมาชิก</span><span>${d.memberNo}</span></div>` : ``}
    <div class="meta-row"><span>สถานะรวม</span><span class="status-pill ${allDone?'done':'pending'}">${allDone?'ครบแล้ว':'ยังมีค้างส่ง'}</span></div>
    <button class="btn" style="width:100%;margin-top:12px;background:var(--red-soft);color:var(--red);" onclick="deleteReceipt()">ลบใบเสร็จนี้ออกจากฐานข้อมูล</button>
    <p id="deleteStatus" style="font-size:12px;color:var(--muted);margin:8px 0 0;"></p>
  </div>`;

  html += `<div class="card"><p class="section-title">รายการสินค้า</p>`;
  d.items.forEach((it, idx)=>{
    const remaining = it.remainingQty||0;
    const isDone = remaining <= 0;
    html += `<div class="item-row ${isDone?'done':'pending'}">
      <div class="item-name">${it.name}</div>
      <div class="item-stats">
        <span>สั่ง: <b>${it.orderedQty} ${it.unit}</b></span>
        <span>รับไปแล้ว: <b>${it.deliveredQty} ${it.unit}</b></span>
        <span>คงเหลือ: <b>${remaining} ${it.unit}</b></span>
      </div>
      ${!isDone ? `
      <div class="pickup-input">
        <input type="number" inputmode="numeric" id="pickupQty_${idx}" placeholder="0" max="${remaining}">
        <span>${it.unit} (รับรอบนี้)</span>
      </div>` : ``}
    </div>`;
  });
  if(!allDone){
    html += `<button class="btn btn-green" style="width:100%;margin-top:4px;" onclick="recordPickup()">บันทึกรับของรอบนี้</button>`;
  }
  html += `<p id="recordStatus" style="font-size:12px;color:var(--muted);margin:8px 0 0;"></p></div>`;

  if(typeof d.total === "number"){
    html += `<div class="card">
      <p class="section-title">ยอดขาย</p>
      <div class="meta-row"><span>ราคา</span><span>${fmtMoney(d.price)}</span></div>
      <div class="meta-row"><span>ส่วนลดรวม</span><span>${fmtMoney(d.discount)}</span></div>
      <div class="meta-row" style="font-weight:700;color:var(--green-deep);"><span>รวมเป็นเงินทั้งสิ้น</span><span>${fmtMoney(d.total)}</span></div>
    </div>`;
  }

  if(d.history && d.history.length){
    html += `<div class="card"><p class="section-title">ประวัติการรับของ</p>`;
    d.history.slice().reverse().forEach(h=>{
      const dt = new Date(h.date);
      const dateStr = dt.toLocaleDateString("th-TH", {day:"2-digit",month:"2-digit",year:"2-digit"}) + " " + dt.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
      const items = (h.deliveredNow||[]).filter(x=>x.qty>0).map(x=>`${x.name} ${x.qty}`).join(", ");
      html += `<div class="meta-row" style="display:block;padding:8px 0;border-bottom:1px dashed var(--line-dot);">
        <div style="font-size:12.5px;color:var(--muted);">${dateStr} · ${h.by||"-"}</div>
        <div style="font-size:13.5px;">${items || h.note || "-"}</div>
      </div>`;
    });
    html += `</div>`;
  }

  resultArea.innerHTML = html;
}

let deleteConfirmPending = false;

window.deleteReceipt = async function(){
  const statusEl = document.getElementById("deleteStatus");
  if(!deleteConfirmPending){
    deleteConfirmPending = true;
    statusEl.textContent = "แน่ใจนะครับ? กดปุ่มซ้ำอีกครั้งเพื่อยืนยันการลบ (ลบแล้วกู้คืนไม่ได้)";
    statusEl.style.color = "var(--red)";
    setTimeout(()=>{ deleteConfirmPending = false; }, 5000);
    return;
  }
  deleteConfirmPending = false;
  statusEl.textContent = "กำลังลบ...";
  statusEl.style.color = "var(--muted)";
  try{
    await deleteDoc(doc(db, "receipts", currentDocId));
    showToast("ลบใบเสร็จเรียบร้อยแล้ว");
    document.getElementById("resultArea").innerHTML = `<div class="card"><p class="empty-state">ลบข้อมูลนี้ออกจากฐานข้อมูลแล้ว</p></div>`;
    currentDocId = null;
    currentData = null;
  } catch(err){
    statusEl.textContent = "ลบไม่สำเร็จ: " + err.message;
    statusEl.style.color = "var(--red)";
  }
};

window.recordPickup = async function(){
  const statusEl = document.getElementById("recordStatus");
  if(!auth.currentUser){
    statusEl.textContent = "ยังไม่ได้เข้าสู่ระบบ";
    statusEl.style.color = "var(--red)";
    return;
  }
  const d = currentData;
  let anyEntered = false;
  const deliveredNow = [];

  const updatedItems = d.items.map((it, idx)=>{
    const input = document.getElementById("pickupQty_"+idx);
    const qty = input ? (Number(input.value)||0) : 0;
    if(qty > 0){
      anyEntered = true;
      deliveredNow.push({name: it.name, qty});
    }
    const newDelivered = (it.deliveredQty||0) + qty;
    const newRemaining = Math.max(0, (it.orderedQty||0) - newDelivered);
    return { ...it, deliveredQty: newDelivered, remainingQty: newRemaining };
  });

  if(!anyEntered){
    statusEl.textContent = "กรอกจำนวนที่รับรอบนี้อย่างน้อย 1 รายการ";
    statusEl.style.color = "var(--red)";
    return;
  }

  statusEl.textContent = "กำลังบันทึก...";
  statusEl.style.color = "var(--muted)";

  try{
    const newHistoryEntry = {
      date: new Date().toISOString(),
      by: auth.currentUser.email,
      note: "รับของเพิ่มเติม",
      deliveredNow
    };
    await updateDoc(doc(db, "receipts", currentDocId), {
      items: updatedItems,
      updatedAt: serverTimestamp(),
      history: [...(d.history||[]), newHistoryEntry]
    });
    currentData.items = updatedItems;
    currentData.history = [...(d.history||[]), newHistoryEntry];
    showToast("บันทึกเรียบร้อยแล้ว");
    renderResult();
  } catch(err){
    statusEl.textContent = "บันทึกไม่สำเร็จ: " + err.message;
    statusEl.style.color = "var(--red)";
  }
};

window.loadPendingList = async function(){
  const listEl = document.getElementById("pendingList");
  listEl.innerHTML = `<div class="card"><p class="empty-state">กำลังโหลด...</p></div>`;
  try{
    const snap = await getDocs(collection(db, "receipts"));
    const pending = [];
    snap.forEach(docSnap=>{
      const d = docSnap.data();
      const hasRemaining = (d.items||[]).some(it => (it.remainingQty||0) > 0);
      if(hasRemaining) pending.push({ id: docSnap.id, ...d });
    });
    if(pending.length === 0){
      listEl.innerHTML = `<div class="card"><p class="empty-state">ไม่มีรายการค้างส่งในตอนนี้</p></div>`;
      return;
    }
    pending.sort((a,b)=>{
      const ta = a.updatedAt && a.updatedAt.toMillis ? a.updatedAt.toMillis() : 0;
      const tb = b.updatedAt && b.updatedAt.toMillis ? b.updatedAt.toMillis() : 0;
      return tb - ta;
    });
    listEl.innerHTML = pending.map(d=>{
      const remainingItems = d.items.filter(it=>(it.remainingQty||0)>0)
        .map(it=>`${it.name} ค้าง ${it.remainingQty} ${it.unit}`).join(" · ");
      return `<div class="pending-card" onclick="jumpToReceipt('${d.receiptNo}')">
        <div class="top-row">
          <span class="receipt-no">${d.receiptNo}</span>
          <span class="status-pill pending">ค้างส่ง</span>
        </div>
        <div class="cust">${d.custName || modeLabel(d.mode)}</div>
        <div class="cust" style="margin-top:4px;">${remainingItems}</div>
      </div>`;
    }).join("");
  } catch(err){
    listEl.innerHTML = `<div class="card"><p class="empty-state" style="color:var(--red);">โหลดไม่สำเร็จ: ${err.message}</p></div>`;
  }
};

window.jumpToReceipt = function(receiptNo){
  switchTab("search");
  document.getElementById("searchInput").value = receiptNo;
  searchReceipt();
};

document.getElementById("searchInput").addEventListener("keydown", (e)=>{
  if(e.key === "Enter") searchReceipt();
});
