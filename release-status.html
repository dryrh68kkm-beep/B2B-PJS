<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>สถานะการปล่อยสินค้า — Big C Sainoi</title>
<style>
  :root{
    --green-deep:#0B5D3B;
    --green:#12804F;
    --green-soft:#E4F3EC;
    --red:#C8272A;
    --red-soft:#FBE7E7;
    --cream:#FAF8F4;
    --ink:#1B211D;
    --muted:#6B756E;
    --line-dot:#C9CFC9;
    --card:#FFFFFF;
    --amber:#B8790A;
    --amber-soft:#FBF0DB;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:"Tahoma","Noto Sans Thai","Segoe UI",system-ui,sans-serif;
    padding-bottom:40px;
    -webkit-font-smoothing:antialiased;
  }
  header{
    background:linear-gradient(135deg,var(--green-deep),var(--green));
    color:#fff;
    padding:22px 18px 26px;
  }
  header .eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    opacity:.85;
    margin:0 0 4px;
  }
  header h1{margin:0;font-size:22px;font-weight:700;}
  header .sub{margin:4px 0 0;font-size:13px;opacity:.9;}

  .wrap{max-width:520px;margin:0 auto;padding:16px;}

  .card{
    background:var(--card);
    border-radius:14px;
    padding:16px;
    margin-bottom:14px;
    box-shadow:0 1px 3px rgba(11,93,59,0.08);
    border:1px solid rgba(11,93,59,0.07);
  }

  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
  label{font-size:12px;color:var(--muted);font-weight:600;}
  input[type=text], input[type=password]{
    border:1px solid #DADFDA;
    border-radius:9px;
    padding:10px 11px;
    font-size:14.5px;
    font-family:inherit;
    background:#fff;
    color:var(--ink);
    width:100%;
  }
  input:focus{outline:2px solid var(--green);outline-offset:1px;}

  .btn{
    padding:12px 16px;
    border-radius:11px;
    border:none;
    font-size:14.5px;
    font-weight:700;
    font-family:inherit;
    cursor:pointer;
  }
  .btn-green{background:var(--green);color:#fff;}
  .btn-outline{background:#fff;border:1.5px solid var(--green);color:var(--green-deep);}

  .section-title{
    font-size:13px;
    font-weight:700;
    color:var(--green-deep);
    text-transform:uppercase;
    letter-spacing:.06em;
    margin:2px 0 10px;
  }

  .summary-grid{display:flex;gap:8px;}
  .summary-cell{
    flex:1;
    text-align:center;
    padding:12px 6px;
    border-radius:12px;
    cursor:pointer;
    border:1.5px solid transparent;
  }
  .summary-cell .num{font-size:22px;font-weight:700;line-height:1.2;}
  .summary-cell .lbl{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .summary-cell.done{background:var(--green-soft);}
  .summary-cell.done .num{color:var(--green-deep);}
  .summary-cell.none{background:var(--amber-soft);}
  .summary-cell.none .num{color:var(--amber);}
  .summary-cell.partial{background:var(--red-soft);}
  .summary-cell.partial .num{color:var(--red);}
  .summary-cell.active{border-color:currentColor;}

  .tabs{display:flex;gap:8px;margin-bottom:14px;}
  .tab-btn{
    flex:1;
    padding:11px 6px;
    border-radius:10px;
    border:1.5px solid #DADFDA;
    background:#fff;
    font-size:13px;
    font-weight:700;
    color:var(--muted);
    cursor:pointer;
    font-family:inherit;
  }
  .tab-btn.active{border-color:var(--green);background:var(--green-soft);color:var(--green-deep);}

  .receipt-card{
    padding:13px;
    border-radius:12px;
    background:#FBFCFB;
    border:1px solid #E7EBE8;
    margin-bottom:10px;
    cursor:pointer;
  }
  .receipt-card:active{background:var(--green-soft);}
  .top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .receipt-no{font-weight:700;font-size:14.5px;}
  .cust{font-size:12.5px;color:var(--muted);}

  .status-pill{
    display:inline-block;
    font-size:11.5px;
    font-weight:700;
    padding:3px 9px;
    border-radius:999px;
  }
  .status-pill.done{background:var(--green-soft);color:var(--green-deep);}
  .status-pill.none{background:var(--amber-soft);color:var(--amber);}
  .status-pill.partial{background:var(--red-soft);color:var(--red);}

  .empty-state{text-align:center;color:var(--muted);font-size:13.5px;padding:20px 10px;}

  .item-line{font-size:12.5px;color:var(--muted);margin-top:2px;}
</style>
</head>
<body>

<header>
  <p class="eyebrow">Loss Prevention · Big C Hyper Sainoi</p>
  <h1>สถานะการปล่อยสินค้า</h1>
  <p class="sub">รวมใบเสร็จตามสถานะ: ปล่อยแล้ว / ยังไม่ปล่อย / ปล่อยไม่ครบ</p>
</header>

<div class="wrap">

  <div class="card">
    <div class="summary-grid">
      <div class="summary-cell done active" id="cellDone" onclick="setFilter('done')">
        <div class="num" id="countDone">-</div>
        <div class="lbl">ปล่อยแล้ว</div>
      </div>
      <div class="summary-cell none" id="cellNone" onclick="setFilter('none')">
        <div class="num" id="countNone">-</div>
        <div class="lbl">ยังไม่ปล่อย</div>
      </div>
      <div class="summary-cell partial" id="cellPartial" onclick="setFilter('partial')">
        <div class="num" id="countPartial">-</div>
        <div class="lbl">ปล่อยไม่ครบ</div>
      </div>
    </div>
  </div>

  <div class="card">
    <button class="btn btn-outline" style="width:100%;" onclick="loadReceipts()">รีเฟรชข้อมูล</button>
  </div>

  <div id="listArea"></div>

</div>

<!-- ── Login gate ── -->
<div id="loginOverlay" style="position:fixed;inset:0;background:var(--cream);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px;">
  <div style="width:100%;max-width:360px;background:#fff;border-radius:16px;padding:24px;box-shadow:0 4px 20px rgba(11,93,59,0.12);">
    <p style="font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 4px;">Loss Prevention · Big C Sainoi</p>
    <h2 style="margin:0 0 18px;font-size:19px;color:var(--green-deep);">เข้าสู่ระบบ</h2>
    <div class="field">
      <label>อีเมล</label>
      <input type="text" id="loginEmail" placeholder="อีเมล">
    </div>
    <div class="field">
      <label>รหัสผ่าน</label>
      <input type="password" id="loginPassword" placeholder="รหัสผ่าน">
    </div>
    <button class="btn btn-green" style="width:100%;" onclick="doLogin()">เข้าสู่ระบบ</button>
    <p id="loginError" style="font-size:12.5px;color:var(--red);margin:10px 0 0;"></p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDL-wJBqUmLl5abLPX8hUIfsZkrMbPovRA",
  authDomain: "b2b-pjs.firebaseapp.com",
  projectId: "b2b-pjs",
  storageBucket: "b2b-pjs.firebasestorage.app",
  messagingSenderId: "997047179126",
  appId: "1:997047179126:web:f378ee051bd4f4c6b54c57"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

window.doLogin = function(){
  const email = document.getElementById("loginEmail").value.trim();
  const pass = document.getElementById("loginPassword").value;
  const errEl = document.getElementById("loginError");
  errEl.textContent = "";
  signInWithEmailAndPassword(auth, email, pass).catch(()=>{
    errEl.textContent = "เข้าสู่ระบบไม่สำเร็จ ตรวจสอบอีเมล/รหัสผ่านอีกครั้ง";
  });
};

onAuthStateChanged(auth, (user)=>{
  document.getElementById("loginOverlay").style.display = user ? "none" : "flex";
  if(user) loadReceipts();
});

function modeLabel(m){
  return {
    b2b_pickup: "B2B · ลูกค้ามารับสินค้า",
    b2b_sale: "B2B · ขายสินค้า",
    pjs_sale: "PJS · ขายสินค้า",
    pjs_release: "PJS · ปล่อยสินค้า"
  }[m] || m;
}

// จัดกลุ่มสถานะระดับใบเสร็จ:
//  done    = ทุกรายการ remainingQty <= 0 (ปล่อยแล้วครบ)
//  none    = ทุกรายการ deliveredQty <= 0 (ยังไม่ปล่อยเลยสักรายการ)
//  partial = อย่างอื่นทั้งหมด (ปล่อยไปบางส่วน ยังไม่ครบ)
function classify(d){
  const items = d.items || [];
  if(items.length === 0) return "done";
  const allDone = items.every(it => (it.remainingQty||0) <= 0);
  if(allDone) return "done";
  const noneDelivered = items.every(it => (it.deliveredQty||0) <= 0);
  if(noneDelivered) return "none";
  return "partial";
}

let allReceipts = [];
let currentFilter = "partial";

window.setFilter = function(f){
  currentFilter = f;
  ["done","none","partial"].forEach(k=>{
    document.getElementById("cell" + k.charAt(0).toUpperCase() + k.slice(1)).classList.toggle("active", k === f);
  });
  renderList();
};

window.loadReceipts = async function(){
  const listEl = document.getElementById("listArea");
  listEl.innerHTML = `<div class="card"><p class="empty-state">กำลังโหลด...</p></div>`;
  try{
    const snap = await getDocs(collection(db, "receipts"));
    allReceipts = [];
    snap.forEach(docSnap=>{
      const d = docSnap.data();
      allReceipts.push({ id: docSnap.id, ...d, _status: classify(d) });
    });
    allReceipts.sort((a,b)=>{
      const ta = a.updatedAt && a.updatedAt.toMillis ? a.updatedAt.toMillis() : 0;
      const tb = b.updatedAt && b.updatedAt.toMillis ? b.updatedAt.toMillis() : 0;
      return tb - ta;
    });
    document.getElementById("countDone").textContent = allReceipts.filter(r=>r._status==="done").length;
    document.getElementById("countNone").textContent = allReceipts.filter(r=>r._status==="none").length;
    document.getElementById("countPartial").textContent = allReceipts.filter(r=>r._status==="partial").length;
    renderList();
  } catch(err){
    listEl.innerHTML = `<div class="card"><p class="empty-state" style="color:var(--red);">โหลดไม่สำเร็จ: ${err.message}</p></div>`;
  }
};

function statusLabel(s){
  return { done: "ปล่อยแล้ว", none: "ยังไม่ปล่อย", partial: "ปล่อยไม่ครบ" }[s];
}

function renderList(){
  const listEl = document.getElementById("listArea");
  const filtered = allReceipts.filter(r => r._status === currentFilter);
  if(filtered.length === 0){
    listEl.innerHTML = `<div class="card"><p class="empty-state">ไม่มีรายการในหมวดนี้</p></div>`;
    return;
  }
  listEl.innerHTML = filtered.map(d=>{
    const itemLines = (d.items||[]).map(it=>
      `${it.name}: ${it.deliveredQty||0}/${it.orderedQty||0} ${it.unit}`
    ).join(" · ");
    return `<div class="receipt-card" onclick="window.location.href='database.html?receipt=${encodeURIComponent(d.receiptNo)}'">
      <div class="top-row">
        <span class="receipt-no">${d.receiptNo}</span>
        <span class="status-pill ${d._status}">${statusLabel(d._status)}</span>
      </div>
      <div class="cust">${d.custName || modeLabel(d.mode)}</div>
      <div class="item-line">${itemLines}</div>
    </div>`;
  }).join("");
}
</script>

</body>
</html>
